name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yaml'
      - '.github/workflows/deploy_site.yaml'
      - 'identity/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch printer.py from dpd-db
        run: |
          rm -f tools/printer.py
          curl -fsSL "https://raw.githubusercontent.com/sasanarakkha/dpd-db-sbs/main/tools/printer.py" -o tools/printer.py

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-processing
        run: bash scripts/web_preprocessing.sh

      - name: Build site
        run: uv run mkdocs build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
